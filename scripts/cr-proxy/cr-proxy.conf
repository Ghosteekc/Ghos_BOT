# Clash Royale API reverse proxy for VPS
# Railway -> this VPS (static IP) -> api.clashroyale.com
#
# Install on Ubuntu/Debian:
#   sudo apt update && sudo apt install -y nginx
#   sudo cp cr-proxy.conf /etc/nginx/sites-available/cr-proxy
#   sudo nano /etc/nginx/sites-available/cr-proxy   # set PROXY_SECRET
#   sudo ln -sf /etc/nginx/sites-available/cr-proxy /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo ufw allow OpenSSH && sudo ufw allow 80/tcp && sudo ufw enable

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Замените на свой секрет (тот же, что CLASH_ROYALE_PROXY_SECRET на Railway)
    set $cr_proxy_secret "CHANGE_ME_TO_LONG_RANDOM_SECRET";

    location /v1/ {
        if ($http_x_cr_proxy_secret != $cr_proxy_secret) {
            return 403 "Forbidden\n";
        }

        proxy_pass https://api.clashroyale.com/v1/;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;

        proxy_set_header Host api.clashroyale.com;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Accept $http_accept;

        proxy_connect_timeout 15s;
        proxy_read_timeout 15s;
    }

    location / {
        return 404;
    }
}
